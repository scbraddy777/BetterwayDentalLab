[build]
  publish = "."

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/case-submission"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/case-submission/"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/submit-case"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/submit-case/"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/case-submission.html"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/account"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/account/"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/login"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/register"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/logout"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[redirects]]
  from = "/account.html"
  to = "https://betterwayclient.seazona.app/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
